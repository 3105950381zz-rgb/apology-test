<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fff7f7;color:#3b1a1a;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(180deg,#fff7f7,#ffe4e6)}
#app{min-height:100vh;max-width:480px;margin:0 auto;padding:0;display:flex;flex-direction:column}
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 24px;text-align:center}
.home-icon{font-size:64px;margin-bottom:12px}
.home h1{font-size:26px;font-weight:800;margin-bottom:8px;color:#3b1a1a}
.home p{font-size:13px;color:#6b2a2a;opacity:.5;line-height:1.8;margin-bottom:24px;max-width:300px}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff;box-shadow:0 4px 20px rgba(225,29,72,.15)}
.btn-second{background:rgba(255,255,255,.5);color:#6b2a2a;border:1px solid rgba(225,29,72,.08)}

.q-screen{display:none;flex-direction:column;flex:1;padding:24px 20px}
.q-screen.active{display:flex}
.q-progress{margin-bottom:20px}
.q-bar-bg{height:6px;background:rgba(225,29,72,.06);border-radius:3px;overflow:hidden}
.q-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#f43f5e,#e11d48);transition:width .4s ease}
.q-num{font-size:12px;color:#6b2a2a;opacity:.3;margin-top:6px;text-align:right}
.q-question{font-size:17px;font-weight:700;line-height:1.6;margin-bottom:20px;color:#3b1a1a}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{width:100%;padding:16px;border:1.5px solid rgba(225,29,72,.06);border-radius:12px;background:rgba(255,255,255,.45);font-size:14px;color:#3b1a1a;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.5}
.q-opt:hover{border-color:#f43f5e;background:rgba(255,255,255,.65)}
.q-opt:active{transform:scale(.97)}
.q-opt.selected{border-color:#e11d48;background:rgba(225,29,72,.06)}
.q-opt .tag{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:10px;font-weight:700;margin-right:10px;color:#fff}
.q-opt .s1{background:#f43f5e}.q-opt .s2{background:#e11d48}.q-opt .s3{background:#be123c}.q-opt .s4{background:#881337}

.r-screen{display:none;flex-direction:column;padding:28px 20px 24px}
.r-screen.active{display:flex}
.r-center{text-align:center}
.r-icon{font-size:56px;margin-bottom:8px}
.r-badge{display:inline-block;padding:4px 14px;border-radius:999px;font-size:11px;font-weight:600;margin-bottom:12px}
.r-score{font-size:48px;font-weight:800;margin:4px 0;letter-spacing:-1px}
.r-title{font-size:20px;font-weight:800;margin-bottom:4px;color:#3b1a1a}
.r-sub{font-size:12px;color:#6b2a2a;opacity:.3;margin-bottom:16px}
.r-msg{padding:20px;border-radius:16px;background:rgba(255,255,255,.6);border:1px solid rgba(225,29,72,.06);margin-bottom:14px;font-size:14px;line-height:2;color:#3b1a1a;text-align:center}
.r-msg .note{font-size:12px;color:#6b2a2a;opacity:.4;margin-top:12px;display:block}
.r-actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;padding-top:12px}
</style>
</head>
<body>
<div class="bg"></div>
<div id="app"></div>

<script>
const Q=[{q:'他惹你生气了，但你知道他心里其实是？',o:['慌得一批 不知道怎么办','觉得你会自己消气','在等合适的时机道歉','已经后悔了但嘴硬']},{q:'你觉得他最需要做的是什么？',o:['认真听你说完 不要打断','买你爱吃的东西出现在你面前','发一条很长的消息说清楚','给你空间让你自己待着']},{q:'如果他现在站在你面前，你最想他说的第一句话是？',o:['对不起 我来认错了 你想说什么我都听着','别生气了好不好','我错了原谅我吧','你骂我吧我不还口']},{q:'你觉得他最让你生气的点是？',o:['他根本没意识到我为什么难过','他态度不好还跟我杠','他每次都这样说了不改','他根本不在乎我的感受']},{q:'如果他真的知道自己错在哪了，你会？',o:['给他一个台阶下吧我其实也不想冷战','我还要再观察一下看看他是不是真的懂了','让他再急一急长点记性','他认错我就原谅他']},{q:'你希望他怎么补偿你？',o:['认真跟我说说心里话','带我去吃好吃的或者陪我做我喜欢的事','用实际行动对我好 不是嘴上说说','给我写一封信或者一段真心话']},{q:'你觉得你们和好后他会变好吗？',o:['如果他真的听进去了就会变好','难 他每次都一个样','希望吧 但我愿意再信他一次','他不变好我就不要他了']},{q:'你现在最想跟他说的一句话是？',o:['你知不知道我为什么生气','你哄哄我就好了啊我又不难哄','你要是不在乎我就直说','我真的好喜欢你你不要让我失望好不好']}];

const L=['A','B','C','D'];let cur=0,s=0;
const A=document.getElementById('app');

function go(){cur=0;s=0;A.innerHTML='';rQ();}

function rQ(){
  if(cur>=Q.length){shR();return;}
  const q=Q[cur];const p=cur/Q.length*100;
  A.innerHTML='<div class="q-screen active"><div class="q-progress"><div class="q-bar-bg"><div class="q-bar" style="width:'+p+'%"></div></div><div class="q-num">'+(cur+1)+'/'+Q.length+'</div></div><div class="q-question">'+q.q+'</div><div class="q-opts">'+
    q.o.map((t,i)=>'<button class="q-opt" onclick="pk('+i+')"><span class="tag s'+(i+1)+'" style="background:'+['#f43f5e','#e11d48','#be123c','#881337'][i]+'">'+L[i]+'</span>'+t+'</button>').join('')+'</div></div>';
}

function pk(i){
  document.querySelectorAll('.q-opt').forEach(b=>b.style.pointerEvents='none');
  document.querySelectorAll('.q-opt')[i].classList.add('selected');
  s+=(3-i);
  setTimeout(()=>{cur++;rQ();},250);
}

function shR(){
  let msg='',icon,scoreC,badge,title,sub;
  if(s<=5){
    icon='😅';badge='还有点笨';scoreC='#f43f5e';
    title='他还没开窍 但他在努力';
    sub='别放弃他 他已经在学了';
    msg='我知道我有时候真的很笨 你生气了都不知道怎么哄你\n\n很多时候我不是不在乎你 是我真的没反应过来 等我反应过来的时候你已经很失望了\n\n但我不想让你一直失望 我想学 学怎么对你好 学怎么在你生气的时候不是跑开而是抱住你\n\n你再教我一次好不好 我会认真学的 🥺';
  } else if(s<=9){
    icon='😊';badge='他在进步了';scoreC='#f97316';
    title='他已经在反省了';
    sub='给他一个机会吧 他值得';
    msg='我知道我错在哪了 我真的知道\n\n你不开心不是因为你小题大做 是我确实让你失望了\n\n你生气是因为你在乎 而我偏偏在你在乎的事情上没做好\n\n对不起 我以后不会再让你因为你已经说过的事情再难过一次\n\n你再信我一次 我用行动证明给你看 ❤️';
  } else if(s<=13){
    icon='🥹';badge='他满分毕业了';scoreC='#10b981';
    title='他完全知道怎么让你消气';
    sub='你教得好 他学会了';
    msg='谢谢你还愿意看完这个\n\n其实我知道 你生气不是因为这件事 是因为你积累了好多次没说出口的失望\n\n我一直在想 为什么同样的问题会反复出现 后来我明白了——不是我改不了 是我没有真的去听你在说什么\n\n你以后生气的时候 不用忍着不用假装没事 你可以骂我 可以不理我 但不要怀疑我是不是在乎你\n\n我超在乎的 不然我也不会在这里做这个给你看了 🥹';
  } else if(s<=16){
    icon='😭';badge='他太爱你了';scoreC='#3b82f6';
    title='你是被他放在心尖上的人';
    sub='他知道自己有多幸运';
    msg='你做这个测试的时候 他可能在旁边偷偷紧张\n\n他紧张不是怕你生气 是怕你不开心\n\n你对他真的很重要 重要到他不知道该用什么方式让你知道\n\n所以他做了这个——不是想敷衍你 是想让你看到他的真心\n\n你对他笑一笑好不好？他一天没见你笑了 很想你 🥺\n\n对不起 我爱你 谢谢你还在 ❤️';
  } else {
    icon='💕';badge='命中注定';scoreC='#ec4899';
    title='他这辈子都不舍得放开你';
    sub='你是他最珍贵的宝贝';
    msg='做完这个测试的你 可能已经在笑了 也可能眼眶有点红\n\n不管是哪种 他都很想抱抱你\n\n他知道自己不够好 但他愿意为了你变得更好\n\n你知道最让他感动的是什么吗？不是你不生气了\n\n是你在生气的时候 还是选择给他机会\n\n这世界上有那么多人在将就 但你们在互相奔赴\n\n他真的很幸运 有你 ❤️\n\n对不起 我爱你 未来每一个日子 我都会比前一天更爱你 💕';
  }

  const rC=['#f43f5e','#f97316','#10b981','#3b82f6','#ec4899'][s<=5?0:s<=9?1:s<=13?2:s<=16?3:4];
  const rT=['#fff7f7','#fff7f7','#f0fdf4','#eff6ff','#fdf2f8'][s<=5?0:s<=9?1:s<=13?2:s<=16?3:4];

  A.innerHTML='<div class="r-screen active" style="background:'+rT+'"><div class="r-center"><div class="r-icon">'+icon+'</div><div class="r-badge" style="background:rgba(225,29,72,.06);color:'+scoreC+'">'+badge+'</div><div class="r-score" style="color:'+rC+'">'+s+'</div><div class="r-title">'+title+'</div><div class="r-sub">'+sub+'</div></div><div class="r-msg">'+msg.replace(/\n/g,'<br>')+'</div><div class="r-actions"><button class="btn btn-primary" onclick="cp()">📸 截图留念</button><button class="btn btn-second" onclick="go()">🔁 再测一次</button></div></div>';
}

function cp(){
  const el=document.querySelector('.r-screen');
  if(!el)return;
  if(typeof html2canvas==='undefined'){alert('请截图保存');return}
  html2canvas(el,{backgroundColor:'#fff7f7',scale:2,useCORS:true,logging:false}).then(c=>{
    c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='给宝贝的道歉信.png';a.click()});
  }).catch(()=>alert('截图失败'));
}

function hm(){
  A.innerHTML='<div class="home"><div style="font-size:64px;margin-bottom:12px">💌</div><h1>一封给你的信</h1><p>这里有个人想对你说的话<br>都在这个测试里了<br>答完你就知道了 🥹</p><button class="btn btn-primary" onclick="go()">打开看看</button></div>';
}

hm();
</script>
</body>
</html>
