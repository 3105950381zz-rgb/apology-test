<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>能原谅我吗</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#fef2f2;color:#3b1a1a;min-height:100vh;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(180deg,#fef2f2,#fee2e2)}
#app{min-height:100vh;max-width:480px;margin:0 auto;padding:0;display:flex;flex-direction:column}

.home{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 24px;text-align:center}
.home-icon{font-size:72px;margin-bottom:12px}
.home h1{font-size:26px;font-weight:800;margin-bottom:6px;color:#3b1a1a}
.home p{font-size:13px;color:#6b2a2a;opacity:.5;line-height:1.8;margin-bottom:20px;max-width:320px}
.home .to{display:inline-block;padding:4px 14px;background:rgba(239,68,68,.06);border-radius:8px;font-size:12px;color:#b91c1c;margin-bottom:8px;font-weight:500}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.96)}
.btn-primary{background:#b91c1c;color:#fff;box-shadow:0 4px 20px rgba(185,28,28,.15)}
.btn-second{background:rgba(255,255,255,.5);color:#6b2a2a;border:1px solid rgba(185,28,28,.08)}

.q-screen{display:none;flex-direction:column;flex:1;padding:24px 20px}
.q-screen.active{display:flex}
.q-progress{margin-bottom:20px}
.q-bar-bg{height:6px;background:rgba(185,28,28,.06);border-radius:3px;overflow:hidden}
.q-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#ef4444,#b91c1c);transition:width .4s ease}
.q-num{font-size:12px;color:#6b2a2a;opacity:.3;margin-top:6px;text-align:right}
.q-question{font-size:17px;font-weight:700;line-height:1.6;margin-bottom:20px;color:#3b1a1a}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{width:100%;padding:16px;border:1.5px solid rgba(185,28,28,.06);border-radius:12px;background:rgba(255,255,255,.5);font-size:14px;color:#3b1a1a;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.5}
.q-opt:hover{border-color:#ef4444;background:rgba(255,255,255,.7)}
.q-opt:active{transform:scale(.97)}
.q-opt.selected{border-color:#b91c1c;background:rgba(239,68,68,.06)}
.q-opt .tag{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:10px;font-weight:700;margin-right:10px;color:#fff;flex-shrink:0}
.q-opt .s1{background:#ef4444}.q-opt .s2{background:#dc2626}.q-opt .s3{background:#b91c1c}.q-opt .s4{background:#991b1b}

.r-screen{display:none;flex-direction:column;padding:32px 20px 24px}
.r-screen.active{display:flex}
.r-center{text-align:center}
.r-badge{display:inline-block;padding:5px 16px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:10px}
.r-score{font-size:64px;font-weight:800;margin:6px 0}
.r-title{font-size:22px;font-weight:800;margin-bottom:4px;color:#3b1a1a}
.r-sub{font-size:12px;color:#6b2a2a;opacity:.4;margin-bottom:16px}
.r-desc{padding:16px;border-radius:12px;background:rgba(255,255,255,.5);border:1px solid rgba(185,28,28,.04);margin-bottom:16px;font-size:13px;line-height:1.8;color:#3b1a1a}
.r-actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;padding-top:12px}
</style>
</head>
<body>
<div class="bg"></div>
<div id="app"></div>

<script>
const Q=[{q:'你昨晚让她生气了，今天醒来第一件事你做了什么？',o:['马上发消息问她醒了没吃早餐没','假装什么也没发生发了个早安表情包','等她先发消息来我再回','翻了翻聊天记录看看她有多生气然后想好怎么认错']},
{q:'你主动道歉了，她回了个"嗯"，你接下来会？',o:['继续说"我真的知道错了你愿意跟我聊聊吗"','那我也沉默了等她消气','再发十条消息解释自己','问她"你嗯是什么意思"']},
{q:'你觉得你现在最应该做的、最能让她消气的事是什么？',o:['搞清楚她到底为什么难过然后认认真真道歉一次','算了等她消气了我再去哄她','买个她之前说想要的礼物给她惊喜','用行动对她好让她知道我错了']},
{q:'她说你根本不知道自己错在哪，你会？',o:['那你跟我说我这次一定认真听不打断你','你每次都这样说但我真的不知道啊','我知道我肯定有哪里没做好你能不能跟我讲讲','你觉得我错那就算我错了吧']},
{q:'你站在她面前，说的第一句话你会选？',o:['对不起我来认错了你有什么想说的我都听着','别生气了嘛气坏了身体不好','我错了我下次不会了','我来了你想骂就骂吧我不还口']},
{q:'你怎么让她相信你是真心道歉不是敷衍？',o:['看着她的眼睛认真说出我错在哪以后怎么改','道歉用嘴说有什么用我用行动做给你看','发一个大红包表示诚意','写保证书按手印发给她']},
{q:'她还是很冷淡，你会怎么办？',o:['不放弃但给她空间，偶尔传递"我还在"的信号','那我也冷淡回去","直接出现在她面前抱住她不放手','找她朋友帮忙说情']},
{q:'你觉得一段道歉里最重要的部分是什么？',o:['让她感觉到我真的懂了为什么她会难过','把事情经过说清楚谁对谁错','表达我有多后悔多内疚','承诺以后绝对不会再犯']},
{q:'这次和好以后，你打算怎么做？',o:['真的反思自己哪些地方有问题然后改，不让同一个问题再发生一次','和好了就好了过去就让它过去吧','对她更好更细心让她看到我的改变','以后注意点别再踩雷就行了']},
{q:'最后，你想对她说什么？',o:['对不起让你难过了，我在改，你再给我一次机会我证明给你看','别生气了好不好','我真的好喜欢你不要生气了好不好','我知道我很过分但我真的知道错了原谅我这一次吧']}];

const R=[
  {min:0,max:3,icon:'😤',c:'#ef4444',badge:'不及格',bs:'background:rgba(239,68,68,.1);color:#ef4444',title:'她不想理你',desc:'你这分数……说实话她没把你拉黑已经是在给机会了。你连认真道歉都不愿意，她怎么可能消气？从现在开始不要发消息了，直接去见她。见到她什么都不用解释，先抱紧再说。你要用行动证明，不是用嘴。'},
  {min:4,max:6,icon:'😐',c:'#f59e0b',badge:'勉强',bs:'background:rgba(245,158,11,.1);color:#b45309',title:'她还在犹豫要不要原谅你',desc:'你想道歉但你的方式还停留在"我道过歉了是她不领情"的阶段。她要的不是一句"对不起"，是"我知道我让你难过了"。想想她最近一次沉默的那个表情，那才是你要道歉的原因。别糊弄，她看得出来的。'},
  {min:7,max:10,icon:'😊',c:'#10b981',badge:'还不错',bs:'background:rgba(16,185,129,.1);color:#059669',title:'她已经心软了',desc:'你的态度挺真诚的，你是真的有认真在想怎么道歉。她其实不是想一直生气，她在等你走出那一步。去吧见她，把你选的那些答案变成真的。她已经在等你了。'},
  {min:11,max:15,icon:'🥹',c:'#3b82f6',badge:'满分',bs:'background:rgba(59,130,246,.1);color:#2563eb',title:'她早就原谅你了',desc:'满分！你完全知道她在意什么，你已经在用正确的方式思考了。现在不要犹豫，截图发给她，然后直接去见TA。她要的从来不是赢你，是看到你在乎。你做到了。'},
  {min:16,max:20,icon:'😭',c:'#ec4899',badge:'天花板',bs:'background:rgba(236,72,153,.1);color:#db2777',title:'她已经被你感动了',desc:'你不仅是满分，你已经是道歉界的天花板了。但你也要记住——每一次原谅都是在透支信任。她原谅你不是因为你会道歉，是因为她爱你。希望你以后在让她生气之前，先想想你在这里答过的题。现在去截图发给她吧，她等你这句话等了很久了。'}];

let cur=0,s=0;
const L=['A','B','C','D'];
const A=document.getElementById('app');

function go(){cur=0;s=0;A.innerHTML='';rQ();}

function rQ(){
  if(cur>=Q.length){shR();return;}
  const q=Q[cur];const p=cur/Q.length*100;
  A.innerHTML='<div class="q-screen active"><div class="q-progress"><div class="q-bar-bg"><div class="q-bar" style="width:'+p+'%"></div></div><div class="q-num">'+(cur+1)+'/'+Q.length+'</div></div><div class="q-question">'+q.q+'</div><div class="q-opts">'+
    q.o.map((t,i)=>'<button class="q-opt" onclick="pk('+i+')"><span class="tag s'+(i+1)+'">'+L[i]+'</span>'+t+'</button>').join('')+'</div></div>';
}

function pk(i){
  document.querySelectorAll('.q-opt').forEach(b=>b.style.pointerEvents='none');
  document.querySelectorAll('.q-opt')[i].classList.add('selected');
  s+=(3-i);
  setTimeout(()=>{cur++;rQ();},300);
}

function shR(){
  const r=R.find(r=>s>=r.min&&s<=r.max)||R[R.length-1];
  A.innerHTML='<div class="r-screen active"><div class="r-center"><div style="font-size:72px;margin-bottom:6px">'+r.icon+'</div><div class="r-badge" style="'+r.bs+'">'+r.badge+'</div><div class="r-score" style="color:'+r.c+'">'+s+'</div><div class="r-title">'+r.title+'</div><div class="r-sub">满分20分 · 你得了'+s+'分</div></div><div class="r-desc">'+r.desc+'</div><div class="r-actions"><button class="btn btn-primary" onclick="cp()">📸 截图发给她</button><button class="btn btn-second" onclick="hm()">🔁 重新答</button></div></div>';
}

function cp(){
  const el=document.querySelector('.r-screen');
  if(!el)return;
  if(typeof html2canvas==='undefined'){alert('请手动截图');return}
  html2canvas(el,{backgroundColor:'#fef2f2',scale:2,useCORS:true,logging:false}).then(c=>{
    c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='能原谅我吗.png';a.click()});
  }).catch(()=>alert('截图失败'));
}

function hm(){
  A.innerHTML='<div class="home"><div class="home-icon">🥺</div><h1>能原谅我吗</h1><p>认认真真答完这份题<br>截图发给她<br>让她看到你的真心</p><button class="btn btn-primary" onclick="go()">开始答题</button><div style="margin-top:16px;font-size:11px;color:#6b2a2a;opacity:.3">答完截图发给她 · 她等着呢</div></div>';
}

hm();
</script>
</body>
</html>
